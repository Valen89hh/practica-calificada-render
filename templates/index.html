<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Persona</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Registro de Personal</h1>
        
        <a href="/administrar" class="administrar-link">Administrar Registros</a>
        <div class="separator"></div>
        <form action="/registrar" method="post">
            <div class="form-group">
                <label for="dni">DNI:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="dni" name="dni" maxlength="8" required style="flex: 1;">
                    <button type="button" id="btn-buscar" onclick="buscarDNI()" style="background-color: #28a745; white-space: nowrap;">Buscar</button>
                </div>
                <span id="dni-status" style="font-size: 12px; margin-top: 5px; display: block;"></span>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>
            </div>
            <div class="form-group">
                <label for="direccion">Dirección:</label>
                <input type="text" id="direccion" name="direccion">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono" name="telefono">
            </div>
            <button type="submit" onclick="mostrarMensaje()">Registrar</button>
        </form>
    </div>

    <!-- Modal para el mensaje de registro exitoso -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarMensaje()">&times;</span>
            <p>¡Registro exitoso!</p>
        </div>
    </div>

    <!-- Script para manejar el modal y consulta DNI -->
    <script>
        function mostrarMensaje() {
            var modal = document.getElementById('modal');
            modal.style.display = 'block';
        }

        function cerrarMensaje() {
            var modal = document.getElementById('modal');
            modal.style.display = 'none';
        }

        function buscarDNI() {
            var dni = document.getElementById('dni').value.trim();
            var status = document.getElementById('dni-status');

            if (dni.length !== 8) {
                status.textContent = 'El DNI debe tener 8 dígitos';
                status.style.color = 'red';
                return;
            }

            status.textContent = 'Buscando...';
            status.style.color = '#007bff';
            document.getElementById('btn-buscar').disabled = true;

            fetch('/consultar_dni/' + dni)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('nombre').value = data.nombres;
                        document.getElementById('apellido').value = data.apellido_paterno + ' ' + data.apellido_materno;
                        document.getElementById('direccion').value = data.direccion;
                        status.textContent = 'Datos encontrados';
                        status.style.color = 'green';
                    } else {
                        status.textContent = 'DNI no encontrado';
                        status.style.color = 'red';
                    }
                })
                .catch(error => {
                    status.textContent = 'Error al consultar';
                    status.style.color = 'red';
                })
                .finally(() => {
                    document.getElementById('btn-buscar').disabled = false;
                });
        }
    </script>
</body>
</html>
