<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Persona</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/nprogress@0.2.0/nprogress.css">
</head>
<body>
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">
        {{ message }}
        <span class="alert-close" onclick="this.parentElement.remove()">&times;</span>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="container">
        <h1>Registro de Personal</h1>

        <a href="/administrar" class="administrar-link">Administrar Registros</a>
        <div class="separator"></div>
        <form action="/registrar" method="post">
            <div class="form-group">
                <label for="dni">DNI:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="dni" name="dni" maxlength="8" required style="flex: 1;">
                    <button type="button" id="btn-buscar" onclick="buscarDNI()" style="background-color: #28a745; white-space: nowrap;">Buscar</button>
                </div>
                <span id="dni-status" style="font-size: 12px; margin-top: 5px; display: block;"></span>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>
            </div>
            <div class="form-group">
                <label for="direccion">Direcci&oacute;n:</label>
                <input type="text" id="direccion" name="direccion">
            </div>
            <div class="form-group">
                <label for="telefono">Tel&eacute;fono:</label>
                <input type="text" id="telefono" name="telefono">
            </div>
            <button type="submit" onclick="return validarFormulario()">Registrar</button>
        </form>
    </div>

    <script src="https://unpkg.com/nprogress@0.2.0/nprogress.js"></script>
    <script>
        // NProgress en navegacion
        document.addEventListener('click', function(e) {
            var link = e.target.closest('a');
            if (link && link.href && !link.href.startsWith('javascript')) {
                NProgress.start();
            }
        });
        document.querySelectorAll('form').forEach(function(form) {
            form.addEventListener('submit', function() { NProgress.start(); });
        });
        window.addEventListener('load', function() { NProgress.done(); });

        // Auto-ocultar alerts
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(el) { el.remove(); });
        }, 4000);

        function validarFormulario() {
            var dni = document.getElementById('dni').value.trim();
            var nombre = document.getElementById('nombre').value.trim();
            var apellido = document.getElementById('apellido').value.trim();

            if (dni.length !== 8) {
                alert('El DNI debe tener 8 d\u00edgitos');
                return false;
            }
            if (nombre === '') {
                alert('El nombre es obligatorio');
                return false;
            }
            if (apellido === '') {
                alert('El apellido es obligatorio');
                return false;
            }
            return true;
        }

        function buscarDNI() {
            var dni = document.getElementById('dni').value.trim();
            var status = document.getElementById('dni-status');

            if (dni.length !== 8) {
                status.textContent = 'El DNI debe tener 8 d\u00edgitos';
                status.style.color = 'red';
                return;
            }

            status.textContent = 'Buscando...';
            status.style.color = '#007bff';
            document.getElementById('btn-buscar').disabled = true;
            NProgress.start();

            fetch('/consultar_dni/' + dni)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('nombre').value = data.nombres;
                        document.getElementById('apellido').value = data.apellido_paterno + ' ' + data.apellido_materno;
                        document.getElementById('direccion').value = data.direccion;
                        status.textContent = 'Datos encontrados';
                        status.style.color = 'green';
                    } else {
                        status.textContent = 'DNI no encontrado';
                        status.style.color = 'red';
                    }
                })
                .catch(error => {
                    status.textContent = 'Error al consultar';
                    status.style.color = 'red';
                })
                .finally(() => {
                    document.getElementById('btn-buscar').disabled = false;
                    NProgress.done();
                });
        }
    </script>
</body>
</html>
