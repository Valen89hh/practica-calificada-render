<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Editar Registro</h1>
        <a href="/administrar" class="administrar-link">Volver a Administrar</a>
        <div class="separator"></div>
        <form action="/actualizar/{{ registro[1] }}" method="post">
            <div class="form-group">
                <label for="dni">DNI:</label>
                <input type="text" id="dni" value="{{ registro[1] }}" disabled>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" value="{{ registro[2] }}" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" value="{{ registro[3] }}" required>
            </div>
            <div class="form-group">
                <label for="direccion">Direcci&oacute;n:</label>
                <input type="text" id="direccion" name="direccion" value="{{ registro[4] }}">
            </div>
            <div class="form-group">
                <label for="telefono">Tel&eacute;fono:</label>
                <input type="text" id="telefono" name="telefono" value="{{ registro[5] }}">
            </div>
            <button type="submit">Guardar Cambios</button>
        </form>
    </div>
</body>
</html>
